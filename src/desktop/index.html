<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cocos Resource Audit</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="toolbar">
      <div class="project">
        <span>Project</span>
        <strong id="projectPath">No project selected</strong>
      </div>
      <button id="chooseProject" type="button">Choose Folder</button>
      <button id="runAudit" type="button" disabled>Run Audit</button>
      <button id="exportReports" type="button" disabled>Export Reports</button>
      <button id="openOutput" type="button" disabled>Open Output</button>
    </header>

    <main>
      <section class="status-line" id="status">Select a Cocos Creator project folder to begin.</section>

      <section class="summary" id="summary"></section>

      <section class="workspace">
        <aside>
          <h2>Categories</h2>
          <div id="categories"></div>

          <h2>Warnings</h2>
          <div id="warnings"></div>
        </aside>

        <section class="table-area">
          <div class="filters">
            <select id="categoryFilter" aria-label="Category filter"></select>
            <select id="statusFilter" aria-label="Reference status filter"></select>
            <input id="search" type="search" placeholder="Search path or file name">
          </div>
          <div id="rows"></div>
        </section>
      </section>
    </main>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>
