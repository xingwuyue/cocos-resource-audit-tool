<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cocos 资源审计工具</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="toolbar">
      <div class="project">
        <span>项目目录</span>
        <strong id="projectPath">未选择项目</strong>
      </div>
      <button id="chooseProject" type="button">选择目录</button>
      <button id="runAudit" type="button" disabled>开始审计</button>
      <button id="exportReports" type="button" disabled>导出报告</button>
      <button id="openOutput" type="button" disabled>打开目录</button>
    </header>

    <main>
      <section class="status-line" id="status">请选择 Cocos Creator 项目目录。</section>

      <section class="summary" id="summary"></section>

      <section class="workspace">
        <aside>
          <h2>资源分类</h2>
          <div id="categories"></div>

          <h2>警告</h2>
          <div id="warnings"></div>
        </aside>

        <section class="table-area">
          <div class="filters">
            <select id="categoryFilter" aria-label="资源分类筛选"></select>
            <select id="statusFilter" aria-label="引用状态筛选"></select>
            <input id="search" type="search" placeholder="搜索路径或文件名">
          </div>
          <div id="rows"></div>
        </section>
      </section>
    </main>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>
